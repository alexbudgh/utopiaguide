site_name: Utopia Guide
site_url: https://utopiaguide.chaos-intel.com/
theme:
  name: material
  features:
  - navigation.tabs
  - navigation.sections
  - navigation.top
  - search.suggest
  - search.highlight
  - content.code.copy
  font:
    text: Merriweather
    code: JetBrains Mono
  palette:
  - scheme: slate
    primary: custom
    accent: custom
    toggle:
      icon: material/brightness-4
      name: Switch to light mode
  - scheme: default
    primary: custom
    accent: custom
    toggle:
      icon: material/brightness-7
      name: Switch to dark mode
extra_css:
- stylesheets/extra.css
markdown_extensions:
- admonition
- footnotes
- pymdownx.details
- pymdownx.superfences
plugins:
- search
