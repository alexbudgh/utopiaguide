name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install mkdocs-material

      - name: Prepare cache-busted CSS
        run: |
          css_hash="${GITHUB_SHA::8}"
          cp docs/stylesheets/extra.css "docs/stylesheets/extra.${css_hash}.css"
          sed "s|stylesheets/extra.css|stylesheets/extra.${css_hash}.css|" mkdocs.yml > mkdocs.github-pages.yml

      - name: Build site
        run: mkdocs build --strict -f mkdocs.github-pages.yml

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          cname: utopiaguide.chaos-intel.com  # replace with your subdomain
